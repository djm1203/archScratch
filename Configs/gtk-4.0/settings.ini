[Settings]
gtk-application-prefer-dark-theme=1
# Catppuccin Mocha (mauve accent) from AUR catppuccin-gtk-theme-mocha.
# Note: libadwaita/GTK4 apps may ignore this; the theme ships a gtk-4.0 assets
# overlay that the AUR package symlinks into ~/.config/gtk-4.0 for full effect.
gtk-theme-name=catppuccin-mocha-mauve-standard+default
gtk-icon-theme-name=breeze-dark
gtk-font-name=Noto Sans 10
gtk-cursor-theme-name=Adwaita
gtk-cursor-theme-size=24
gtk-enable-event-sounds=0
gtk-enable-input-feedback-sounds=0
