# archScratch - central color palette for Hyprland + Hyprlock.
# ┌─────────────────────────────────────────────────────────────────────┐
# │  TO RECOLOR THE DESKTOP: change $accent below (window borders, lock   │
# │  accents). Also update the @accent in waybar/colors and wofi/style,   │
# │  and the kitty/foot palettes, to match. See docs note in README.      │
# └─────────────────────────────────────────────────────────────────────┘
# Tokyo Night base + Catppuccin Mocha accents.

$accent     = rgb(cba6f7)   # primary accent (mauve) ← change me to recolor
$inactive   = rgb(3c3836)   # inactive window border
$surface    = rgb(313244)   # subtle surfaces / outlines
$bg         = rgb(1a1b26)   # dark background
$text       = rgb(c6d0f5)   # foreground text
$green      = rgb(a6d189)   # success / charging
$red        = rgb(e78284)   # error / warning
