# archScratch - Hyprlock config (Catppuccin Mocha / Tokyo Night)

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    contrast = 0.8
    brightness = 0.7
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(313244)
    inner_color = rgb(1a1b26)
    font_color = rgb(c6d0f5)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    check_color = rgb(a6d189)
    fail_color = rgb(e78284)
    fail_text = <i>$FAIL</i>
    fail_transition = 300
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(c6d0f5)
    font_size = 72
    font_family = Inter Bold
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgb(99d1db)
    font_size = 18
    font_family = Inter
    position = 0, 70
    halign = center
    valign = center
}
