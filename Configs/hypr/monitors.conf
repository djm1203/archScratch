# archScratch - Monitor configuration
#
# This file uses Hyprland's auto-detection:
#   monitor=,preferred,auto,1
# means: for every connected display, use its preferred resolution,
# auto-position monitors side by side, at 1x scale.
#
# After logging in, run 'nwg-displays' to configure your exact layout,
# resolution, scale, and positions - it will overwrite this file.
#
# To set scale manually, change the last number (e.g. 1.2 for HiDPI).

monitor=,preferred,auto,1
