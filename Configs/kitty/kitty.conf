# archScratch - kitty config
# kitty is the "terminal with a background image" option (foot can't do images).
# Open kitty with Super+Shift+T; foot remains the default on Super+T.

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
font_size        11.0

# ─── Background image ───────────────────────────────────────────────────────
# Drop YOUR chosen image at ~/.config/kitty/bg.png (any png/jpg; update the name
# below if different). With Configs/ symlinked, that means the repo's
# Configs/kitty/bg.png. Comment these three lines out for a solid background.
background_image            ~/.config/kitty/bg.png
background_image_layout     scaled
background_tint             0.85

# Slight transparency so the desktop wallpaper shows through behind text too.
background_opacity          0.95
dynamic_background_opacity  yes

# ─── Catppuccin Mocha palette (matches the rest of the desktop) ─────────────
foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc
cursor                  #f5e0dc

# black
color0  #45475a
color8  #585b70
# red
color1  #f38ba8
color9  #f38ba8
# green
color2  #a6e3a1
color10 #a6e3a1
# yellow
color3  #f9e2af
color11 #f9e2af
# blue
color4  #89b4fa
color12 #89b4fa
# magenta
color5  #f5c2e7
color13 #f5c2e7
# cyan
color6  #94e2d5
color14 #94e2d5
# white
color7  #bac2de
color15 #a6adc8

# Sensible defaults
scrollback_lines        10000
enable_audio_bell       no
confirm_os_window_close 0
